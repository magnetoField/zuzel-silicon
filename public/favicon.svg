  <rect x="2" y="17" width="4" height="2" fill="#00f0ff" rx="0.5"/>
  <rect x="2" y="22" width="4" height="2" fill="#00f0ff" rx="0.5"/>

  <rect x="26" y="7" width="4" height="2" fill="#00f0ff" rx="0.5"/>
  <rect x="26" y="12" width="4" height="2" fill="#00f0ff" rx="0.5"/>
  <rect x="26" y="17" width="4" height="2" fill="#00f0ff" rx="0.5"/>
  <rect x="26" y="22" width="4" height="2" fill="#00f0ff" rx="0.5"/>

  <rect x="7" y="2" width="2" height="4" fill="#00f0ff" rx="0.5"/>
  <rect x="12" y="2" width="2" height="4" fill="#00f0ff" rx="0.5"/>
  <rect x="17" y="2" width="2" height="4" fill="#00f0ff" rx="0.5"/>
